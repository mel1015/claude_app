spring:
  application:
    name: stock-report
  profiles:
    active: dev
  data:
    mongodb:
      uri: mongodb://localhost:27017/stockreport
  jackson:
    time-zone: Asia/Seoul
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

logging:
  level:
    com.stockreport: DEBUG

gemini:
  api-key: ${GEMINI_API_KEY:}

slack:
  webhook-url: ${SLACK_WEBHOOK_URL:}
